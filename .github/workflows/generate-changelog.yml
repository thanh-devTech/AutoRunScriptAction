name: Generate Changelog

on:
  push:
    branches:
      - dev
    paths:
      - "plug.php"
      - ".gitmodules"
      - "ci-auto-log"
      - "ci-auto-log/**"
      - ".github/workflows/generate-changelog.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-changelog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug git history
        run: |
          echo "=== Current branch ==="
          git branch -a
          git branch --show-current

          echo "=== First-parent history ==="
          git log --first-parent --oneline -30

          echo "=== Version changes in plug.php ==="
          git log -p -- plug.php 2>/dev/null | grep -B5 "Version:" | head -50 || echo "No changes found"

          echo "=== Submodules ==="
          git submodule status --recursive

      - name: Create ci-auto-log config
        run: |
          cat > ci-auto-log/config.ini <<'EOF'
          [changelog]
          PLUGIN_FILE = plug.php
          OUTPUT_FILE = log.txt
          MIN_VERSION = 2.4.7
          MIN_DATE = 2026-03-27
          EOF

      - name: Generate changelog
        run: |
          python3 ci-auto-log/generate_changelog.py

      - name: Commit and push changelog
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          generated_file="$(python3 ci-auto-log/generate_changelog.py --print-output-file)"

          if [ ! -f "$generated_file" ]; then
            echo "No $generated_file generated"
            exit 0
          fi

          file_status="$(git status --porcelain -- "$generated_file")"

          if [ -z "$file_status" ]; then
            echo "No changes to commit"
          else
            git add "$generated_file"
            git commit -m "chore: auto-generate changelog"
            git push origin HEAD:${{ github.ref_name }}
          fi
